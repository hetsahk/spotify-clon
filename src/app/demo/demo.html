<main class="min-h-screen bg-black p-8 text-white">
  <header class="mb-10">
    <h1 class="text-3xl font-bold">Spotify Clon — Card Playground</h1>
    <p class="mt-2 text-sm text-neutral-400">
      Demo de las 3 variantes del componente Card (square, circle, horizontal).
    </p>
  </header>

  <section class="mb-12">
    <h2 class="mb-4 text-xl font-semibold">Square cards</h2>
    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">
      <app-card
        variant="square"
        title="Maria Becerra"
        subtitle="With TINI, TULI..."
        imageUrl="https://picsum.photos/seed/maria/300"
      />
      <app-card
        variant="square"
        title="Top 50 Argentina"
        subtitle="Los hits más escuchados"
        imageUrl="https://picsum.photos/seed/top50ar/300"
      />
      <app-card
        variant="square"
        title="Cumbia 420"
        subtitle="L-Gante, Damas Gratis..."
        imageUrl="https://picsum.photos/seed/cumbia/300"
      />
      <app-card
        variant="square"
        title="Rock Nacional"
        subtitle="Soda, Los Redondos..."
        imageUrl="https://picsum.photos/seed/rocknac/300"
      />
    </div>
  </section>

  <section class="mb-12">
    <h2 class="mb-4 text-xl font-semibold">Circle cards</h2>
    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">
      <app-card
        variant="circle"
        title="Bad Bunny"
        subtitle="Artist"
        imageUrl="https://picsum.photos/seed/badbunny/300"
      />
      <app-card
        variant="circle"
        title="Duki"
        subtitle="Artist"
        imageUrl="https://picsum.photos/seed/duki/300"
      />
      <app-card
        variant="circle"
        title="Nathy Peluso"
        subtitle="Artist"
        imageUrl="https://picsum.photos/seed/nathy/300"
      />
      <app-card
        variant="circle"
        title="Rosalia"
        subtitle="Artist"
        imageUrl="https://picsum.photos/seed/rosalia/300"
      />
    </div>
  </section>

  <section>
    <h2 class="mb-4 text-xl font-semibold">Horizontal cards</h2>
    <div class="flex max-w-sm flex-col gap-1">
      <app-card
        variant="horizontal"
        title="Liked Songs"
        subtitle="Playlist • 297 songs"
        imageUrl="https://picsum.photos/seed/liked/100"
      />
      <app-card
        variant="horizontal"
        title="Discover Weekly"
        subtitle="Playlist • Spotify"
        imageUrl="https://picsum.photos/seed/discover/100"
      />
      <app-card
        variant="horizontal"
        title="Daily Mix 1"
        subtitle="Playlist • Made for you"
        imageUrl="https://picsum.photos/seed/daily1/100"
      />
      <app-card
        variant="horizontal"
        title="Release Radar"
        subtitle="Playlist • Spotify"
        imageUrl="https://picsum.photos/seed/radar/100"
      />
    </div>
  </section>
</main>
